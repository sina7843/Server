# Dragon Ecosystem — Nginx Reverse Proxy
#
# Deployment: single Arvan VPS, Docker Compose (Task 0.10.2)
# Routing:    subdomain-based
#
# ┌──────────────────────────────────────────────────────────────────────────┐
# │  BEFORE DEPLOYING — replace every PLACEHOLDER value:                    │
# │                                                                          │
# │  YOUR_DOMAIN        e.g. example.ir                                     │
# │  YOUR_API_DOMAIN    e.g. api.example.ir                                  │
# │  YOUR_ADMIN_DOMAIN  e.g. admin.example.ir                                │
# │                                                                          │
# │  TLS certificate paths:                                                  │
# │    /etc/ssl/YOUR_DOMAIN/fullchain.pem                                    │
# │    /etc/ssl/YOUR_DOMAIN/privkey.pem                                      │
# │  (Obtain with Let's Encrypt certbot or Arvan CDN — never commit keys)   │
# │                                                                          │
# │  Do not commit real domain names, TLS keys, or credentials here.        │
# └──────────────────────────────────────────────────────────────────────────┘

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Hide nginx version from error pages and Server header
    server_tokens off;

    # Default upload limit (overridden to 50m on the API server block)
    client_max_body_size 1m;

    # ── Upstreams ───────────────────────────────────────────────────────────────
    # Ports match Dockerfile EXPOSE / Docker Compose service ports (Task 0.10.2).

    upstream dragon_api {
        # Docker Compose service name -- resolves to the api container.
        server api:3000;
        keepalive 32;
    }

    upstream dragon_web {
        # Docker Compose service name -- resolves to the web container.
        server web:3001;
        keepalive 32;
    }

    upstream dragon_admin {
        # Docker Compose service name -- resolves to the admin container.
        server admin:3002;
        keepalive 32;
    }

    # No MongoDB (27017) or Redis (6379) upstream — those are internal services
    # that must never be reachable through the public reverse proxy.

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name YOUR_DOMAIN www.YOUR_DOMAIN YOUR_API_DOMAIN YOUR_ADMIN_DOMAIN;
        return 301 https://$host$request_uri;
    }

    # ── Public Web Frontend — YOUR_DOMAIN ───────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name YOUR_DOMAIN www.YOUR_DOMAIN;

        ssl_certificate     /etc/ssl/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/ssl/YOUR_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "SAMEORIGIN"                                  always;
        add_header X-Content-Type-Options     "nosniff"                                     always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"    always;

        # Public web is indexable — no X-Robots-Tag restriction.

        location / {
            proxy_pass         http://dragon_web;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }

    # ── API — YOUR_API_DOMAIN ───────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name YOUR_API_DOMAIN;

        ssl_certificate     /etc/ssl/YOUR_API_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/ssl/YOUR_API_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY"                                        always;
        add_header X-Content-Type-Options     "nosniff"                                     always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;

        # Media uploads require up to 50 MB
        client_max_body_size 50m;

        location / {
            proxy_pass         http://dragon_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Longer timeout for media upload and processing
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }

    # ── Admin Frontend — YOUR_ADMIN_DOMAIN ─────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name YOUR_ADMIN_DOMAIN;

        ssl_certificate     /etc/ssl/YOUR_ADMIN_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/ssl/YOUR_ADMIN_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "SAMEORIGIN"                                  always;
        add_header X-Content-Type-Options     "nosniff"                                     always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"    always;

        # Admin must not appear in search engine indexes
        add_header X-Robots-Tag "noindex,nofollow,noarchive" always;

        location / {
            proxy_pass         http://dragon_admin;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}

